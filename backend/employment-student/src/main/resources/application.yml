server:
  port: 8082

spring:
  application:
    name: employment-student
  
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: ${SERVICE_IP:}
  
    openfeign:
      client:
        config:
          default:
            connect-timeout: 2000
            read-timeout: 5000

  datasource:
    url: jdbc:mysql://localhost:3306/employment_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: employment-platform-jwt-secret-key-2024
  expiration: 86400000

logging:
  level:
    com.example: debug