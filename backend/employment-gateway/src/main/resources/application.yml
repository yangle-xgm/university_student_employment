server:
  port: 8080

spring:
  application:
    name: employment-gateway
  
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        ip: ${SERVICE_IP:}
        enabled: false
    
    gateway:
      discovery:
        locator:
          enabled: false
          lower-case-service-id: true
      
      routes:
        # auth服务后端路径是 /auth，需要移除 /api 前缀
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        
        # 其他服务后端路径都有 /api 前缀，不需要移除
        - id: student-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/students/**
        
        - id: job-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/jobs/**
        
        - id: resume-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/resumes/**
        
        - id: assessment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/assessments/**
        
        - id: career-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/career-plans/**
        
        - id: learning-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/learning/**
        
        - id: interview-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/interviews/**

  main:
    web-application-type: reactive

jwt:
  secret: employment-platform-jwt-secret-key-2024
  expiration: 86400000

whitelist:
  paths:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/refresh-token
    - /api-docs/**
    - /swagger-ui/**
    - /swagger-ui.html
    - /actuator/**

logging:
  level:
    com.example: debug
    org.springframework.cloud.gateway: debug